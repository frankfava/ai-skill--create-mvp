name: Sync skill

# Rebuilds skill/create-mvp/SKILL.md from src/*.md on every push to main and
# commits it back via the GitHub Contents API. API commits are GitHub-verified,
# so they satisfy the "verified signatures" branch rule without a bypass.
#
# The committed folder is what the claude.ai GitHub importer reads:
#   https://github.com/frankfava/ai-skill--create-mvp/tree/main/skill/create-mvp
#
# No self-trigger: the SKILL.md path is not a trigger path, GITHUB_TOKEN commits
# don't start new runs, and the message carries [skip ci] as a third guard.

on:
  push:
    branches: [main]
    paths:
      - src/**
      - export-skill.sh
      - .github/workflows/build-skill.yml
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build SKILL.md
        run: sh export-skill.sh --out skill --no-zip --force

      - name: Commit SKILL.md via GitHub API (verified)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          path="skill/create-mvp/SKILL.md"
          branch="${GITHUB_REF_NAME}"

          new_b64=$(base64 -w0 "$path")

          # Current blob on the branch (empty if the file is new). GitHub wraps
          # its base64 at 60 cols, so strip newlines before comparing.
          cur_b64=$(gh api "repos/$GITHUB_REPOSITORY/contents/$path?ref=$branch" \
            -q '.content' 2>/dev/null | tr -d '\n' || true)

          if [ "$new_b64" = "$cur_b64" ]; then
            echo "SKILL.md unchanged — nothing to commit."
            exit 0
          fi

          sha=$(gh api "repos/$GITHUB_REPOSITORY/contents/$path?ref=$branch" \
            -q '.sha' 2>/dev/null || true)

          gh api --method PUT "repos/$GITHUB_REPOSITORY/contents/$path" \
            -f message="chore: sync SKILL.md from src [skip ci]" \
            -f content="$new_b64" \
            -f branch="$branch" \
            ${sha:+-f sha="$sha"} \
            >/dev/null

          echo "Committed updated SKILL.md (verified)."
